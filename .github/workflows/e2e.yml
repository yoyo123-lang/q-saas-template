name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
      NEXTAUTH_URL: "http://localhost:3000"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/e2e_test"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/e2e_test"
      GOOGLE_CLIENT_ID: "dummy-for-ci"
      GOOGLE_CLIENT_SECRET: "dummy-for-ci"
      ADMIN_EMAIL: "admin@test.local"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to DB
        run: npx prisma db push --skip-generate

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Run smoke tests
        run: npx playwright test tests/e2e/smoke.spec.ts
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

      - name: Post failure logs to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: runId, filter: 'latest'
            });
            let body = '## :x: E2E Failed — Smoke tests\n\n';
            for (const job of jobs.data.jobs) {
              if (job.conclusion !== 'failure' || job.name !== 'Smoke tests') continue;
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner, repo, job_id: job.id
              });
              const lines = logs.data.split('\n');
              const tail = lines.slice(-80).join('\n');
              body += `### ${job.name}\n\`\`\`\n${tail}\n\`\`\`\n\n`;
            }
            body += `[Full logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${runId})`;
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: context.issue.number,
              body
            });

  full:
    name: Full E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      NEXTAUTH_SECRET: ${{ secrets.E2E_NEXTAUTH_SECRET || 'ci-test-secret-not-for-production' }}
      NEXTAUTH_URL: "http://localhost:3000"
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/e2e_test' }}
      DIRECT_URL: ${{ secrets.E2E_DIRECT_URL || 'postgresql://postgres:postgres@localhost:5432/e2e_test' }}
      GOOGLE_CLIENT_ID: ${{ secrets.E2E_GOOGLE_CLIENT_ID || 'dummy-for-ci' }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.E2E_GOOGLE_CLIENT_SECRET || 'dummy-for-ci' }}
      ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL || 'admin@test.local' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to DB
        run: npx prisma db push --skip-generate

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build 2>&1 | tee /tmp/e2e-output.txt; exit ${PIPESTATUS[0]}

      - name: Run full E2E suite
        env:
          CI: true
        run: |
          npx playwright test 2>&1 | tee -a /tmp/e2e-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7

      - name: Post failure logs to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const runId = context.runId;

            let output = '(no se pudo capturar output)';
            try {
              const raw = fs.readFileSync('/tmp/e2e-output.txt', 'utf8');
              const lines = raw.split('\n');
              output = lines.slice(-100).join('\n').replace(/\x1b\[[0-9;]*m/g, '');
            } catch {}

            const body = [
              '## :x: E2E Failed — Full suite',
              '',
              '```',
              output,
              '```',
              '',
              `[Full logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${runId})`,
              'Playwright report disponible como artifact: `playwright-report-full`',
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: context.issue.number,
              body
            });

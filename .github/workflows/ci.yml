name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        env:
          NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
          NEXTAUTH_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "dummy-for-ci"
          GOOGLE_CLIENT_SECRET: "dummy-for-ci"
          ADMIN_EMAIL: "admin@test.local"
        run: npm run build

      - name: Post failure logs to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: runId, filter: 'latest'
            });
            let body = '## :x: CI Failed — Lint + Test + Build\n\n';
            for (const job of jobs.data.jobs) {
              if (job.conclusion !== 'failure') continue;
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner, repo, job_id: job.id
              });
              const lines = logs.data.split('\n');
              const tail = lines.slice(-80).join('\n');
              body += `### ${job.name}\n\`\`\`\n${tail}\n\`\`\`\n\n`;
            }
            body += `[Full logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${runId})`;
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: context.issue.number,
              body
            });

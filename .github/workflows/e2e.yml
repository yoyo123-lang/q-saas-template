name: E2E Tests

on:
  pull_request:
    branches: [main]
  # Permitir ejecución manual
  workflow_dispatch:

env:
  # Variables mínimas para que la app arranque
  NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
  NEXTAUTH_URL: "http://localhost:3000"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/e2e_test"
  # Dummy values — el auth real no se usa en e2e (usamos sesión sintética)
  GOOGLE_CLIENT_ID: "dummy-for-ci"
  GOOGLE_CLIENT_SECRET: "dummy-for-ci"
  ADMIN_EMAIL: "admin@test.local"

jobs:
  e2e:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to DB
        run: npx prisma db push --skip-generate

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
